<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Taste Haven — Admin</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="nav-brand"><img src="images/logo.png" alt="Taste Haven logo" />Taste Haven</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="menu.html">Menu</a></li>
    <li><a href="orders.html">Orders</a></li>
    <li><a href="admin.html" class="active">Admin</a></li>
  </ul>
  <a href="cart.html" class="nav-cart">Cart <span id="cartBadge" class="cart-badge">0</span></a>
  <button id="logoutBtn" class="btn-ghost btn-small">Log Out</button>
</nav>

<main class="container">
  <h1>Admin</h1>
  <p style="color: var(--text-muted); margin-top: -0.5rem;">Manage menu items and orders — no more curl commands.</p>

  <div class="tabs">
    <button class="tab-btn active" data-tab="menuTab">Menu Items</button>
    <button class="tab-btn" data-tab="ordersTab">Orders</button>
  </div>

  <!-- MENU TAB -->
  <div id="menuTab" class="tab-panel active">
    <div class="card" style="margin-bottom:1.5rem;">
      <h3 id="formTitle">Add a Menu Item</h3>
      <form id="menuForm">
        <input type="hidden" id="itemId" />
        <div class="form-grid">
          <div>
            <label for="name">Name</label>
            <input type="text" id="name" required />
          </div>
          <div>
            <label for="category">Category</label>
            <input type="text" id="category" placeholder="e.g. Main Course" required />
          </div>
          <div class="full">
            <label for="description">Description</label>
            <textarea id="description" rows="2" required></textarea>
          </div>
          <div>
            <label for="price">Price (₹)</label>
            <input type="number" id="price" min="0" step="1" required />
          </div>
          <div>
            <label for="image">Image URL (optional)</label>
            <input type="text" id="image" placeholder="https://..." />
          </div>
        </div>
        <div style="display:flex; gap:0.8rem;">
          <button type="submit" id="submitBtn">Add Item</button>
          <button type="button" id="cancelEditBtn" class="btn-ghost" style="display:none;">Cancel</button>
        </div>
      </form>
      <p id="menuFormResponse" class="response-msg" style="display:none;"></p>
    </div>

    <div class="card">
      <h3>Current Menu</h3>
      <table>
        <thead>
          <tr><th>Name</th><th>Category</th><th>Price</th><th>Available</th><th></th></tr>
        </thead>
        <tbody id="menuTableBody">
          <tr><td colspan="5">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ORDERS TAB -->
  <div id="ordersTab" class="tab-panel">
    <div class="card">
      <h3>All Orders</h3>
      <table>
        <thead>
          <tr><th>Order</th><th>Items</th><th>Total</th><th>Status</th><th></th></tr>
        </thead>
        <tbody id="ordersTableBody">
          <tr><td colspan="5">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<footer>&copy; <span id="year"></span> Taste Haven. Made with care.</footer>

<script src="js/config.js"></script>
<script src="js/cart.js"></script>
<script>
document.getElementById('year').textContent = new Date().getFullYear();
const adminToken = localStorage.getItem('th_admin_token');
if (!adminToken) {
  window.location.href = 'login.html';
}
document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem('th_admin_token');
  window.location.href = 'login.html';
});
// --- Tabs ---
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'ordersTab') loadOrdersTable();
  });
});

// --- Menu CRUD ---
async function loadMenuTable() {
  const body = document.getElementById('menuTableBody');
  body.innerHTML = `<tr><td colspan="5">${spinnerHTML("Loading menu...")}</td></tr`;
  try {
    const res = await fetch(`${API_URL}/menu`);
    const menu = await res.json();
    if (!res.ok || !Array.isArray(menu)) throw new Error((menu && (menu.details || menu.error)) || 'Server error');

    if (menu.length === 0) {
      body.innerHTML = `<tr><td colspan="5">No items yet. Add one above.</td></tr>`;
      return;
    }

    body.innerHTML = menu.map(item => `
      <tr>
        <td>${item.name}</td>
        <td>${item.category}</td>
        <td>₹${item.price}</td>
        <td>${item.available === false ? 'No' : 'Yes'}</td>
        <td style="display:flex; gap:6px;">
          <button class="btn-small btn-ghost edit-btn" data-id="${item._id}">Edit</button>
          <button class="btn-small btn-danger delete-btn" data-id="${item._id}">Delete</button>
        </td>
      </tr>
    `).join('');

    body.querySelectorAll('.edit-btn').forEach(b => b.addEventListener('click', () => startEdit(menu.find(m => m._id === b.dataset.id))));
    body.querySelectorAll('.delete-btn').forEach(b => b.addEventListener('click', () => deleteMenuItem(b.dataset.id)));
  } catch (err) {
    console.error('Error loading menu:', err);
    body.innerHTML = `<tr><td colspan="5">Couldn't load menu: ${err.message}</td></tr>`;
  }
}

function startEdit(item) {
  document.getElementById('itemId').value = item._id;
  document.getElementById('name').value = item.name;
  document.getElementById('category').value = item.category;
  document.getElementById('description').value = item.description || '';
  document.getElementById('price').value = item.price;
  document.getElementById('image').value = item.image || '';
  document.getElementById('formTitle').textContent = `Edit "${item.name}"`;
  document.getElementById('submitBtn').textContent = 'Save Changes';
  document.getElementById('cancelEditBtn').style.display = 'inline-flex';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetForm() {
  document.getElementById('menuForm').reset();
  document.getElementById('itemId').value = '';
  document.getElementById('formTitle').textContent = 'Add a Menu Item';
  document.getElementById('submitBtn').textContent = 'Add Item';
  document.getElementById('cancelEditBtn').style.display = 'none';
}

document.getElementById('cancelEditBtn').addEventListener('click', resetForm);

document.getElementById('menuForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const id = document.getElementById('itemId').value;
  const payload = {
    name: document.getElementById('name').value.trim(),
    category: document.getElementById('category').value.trim(),
    description: document.getElementById('description').value.trim(),
    price: Number(document.getElementById('price').value),
    image: document.getElementById('image').value.trim()
  };

  const responseEl = document.getElementById('menuFormResponse');
  try {
    const url = id ? `${API_URL}/update-menu/${id}` : `${API_URL}/add-menu`;
    const method = id ? 'PUT' : 'POST';
    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}`},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.details || data.error || 'Could not save item');

    responseEl.style.display = 'block';
    responseEl.textContent = id ? 'Item updated.' : 'Item added.';
    resetForm();
    loadMenuTable();
  } catch (err) {
    console.error('Error saving menu item:', err);
    responseEl.style.display = 'block';
    responseEl.style.color = 'var(--spice-soft)';
    responseEl.textContent = err.message.includes('fetch') ? "The server isn't reachable." : err.message;
  }
});

async function deleteMenuItem(id) {
  if (!confirm('Delete this menu item?')) return;
  try {
    const res = await fetch(`${API_URL}/delete-menu/${id}`, { method: 'DELETE', headers: {'Authorization': `Bearer ${adminToken}`} });
    const data = await res.json();
    if (!res.ok) throw new Error(data.details || data.error || 'Could not delete item');
    loadMenuTable();
  } catch (err) {
    alert('Error deleting item: ' + err.message);
  }
}

// --- Orders management ---
async function loadOrdersTable() {
  const body = document.getElementById('ordersTableBody');
  body.innerHTML = `<tr><td colspan="5">${spinnerHTML("Loading orders...")}</td></tr>`;
  try {
    const res = await fetch(`${API_URL}/orders`);
    const orders = await res.json();
    if (!res.ok || !Array.isArray(orders)) throw new Error((orders && (orders.details || orders.error)) || 'Server error');

    if (orders.length === 0) {
      body.innerHTML = `<tr><td colspan="5">No orders yet.</td></tr>`;
      return;
    }

    orders.sort((a, b) => new Date(b.orderTime || 0) - new Date(a.orderTime || 0));

    body.innerHTML = orders.map(order => `
      <tr>
        <td>#${order._id.slice(-6).toUpperCase()}</td>
        <td>${(order.items || []).map(i => `${i.item || i.menuItem} × ${i.quantity}`).join(', ')}</td>
        <td>₹${order.totalAmount}</td>
        <td>
          <select class="status-select" data-id="${order._id}" style="margin:0; width:auto;">
            ${['Placed', 'pending', 'completed', 'cancelled'].map(s => `<option value="${s}" ${s === order.status ? 'selected' : ''}>${s}</option>`).join('')}
          </select>
        </td>
        <td><button class="btn-small btn-danger delete-order-btn" data-id="${order._id}">Delete</button></td>
      </tr>
    `).join('');

    body.querySelectorAll('.status-select').forEach(sel => {
      sel.addEventListener('change', () => updateOrderStatus(sel.dataset.id, sel.value));
    });
    body.querySelectorAll('.delete-order-btn').forEach(b => {
      b.addEventListener('click', () => deleteOrder(b.dataset.id));
    });
  } catch (err) {
    console.error('Error loading orders:', err);
    body.innerHTML = `<tr><td colspan="5">Couldn't load orders: ${err.message}</td></tr>`;
  }
}

async function updateOrderStatus(id, status) {
  try {
    const res = await fetch(`${API_URL}/update-order/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` },
      body: JSON.stringify({ status })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.details || data.error || 'Could not update status');
  } catch (err) {
    alert('Error updating status: ' + err.message);
    loadOrdersTable();
  }
}

async function deleteOrder(id) {
  if (!confirm('Delete this order?')) return;
  try {
    const res = await fetch(`${API_URL}/delete-order/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${adminToken}` } });
    const data = await res.json();
    if (!res.ok) throw new Error(data.details || data.error || 'Could not delete order');
    loadOrdersTable();
  } catch (err) {
    alert('Error deleting order: ' + err.message);
  }
}

loadMenuTable();
</script>
</body>
</html>
