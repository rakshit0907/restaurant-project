<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Taste Haven — Menu</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-brand"><img src="images/logo.png" alt="Taste Haven logo" />Taste Haven</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="menu.html" class="active">Menu</a></li>
    <li><a href="orders.html">Orders</a></li>
    <li><a href="admin.html">Admin</a></li>
  </ul>
  <a href="cart.html" class="nav-cart">Cart <span id="cartBadge" class="cart-badge">0</span></a>
</nav>

<main class="container">
  <h1>Our Menu</h1>
  <p style="color: var(--text-muted); margin-top: -0.5rem;">Tap any dish to add it straight to your cart.</p>
  <input type="text" id="searchInput" placeholder="Search dishes..." />
  <div class="pill-row" id="categoryPills"></div>

  <div id="menuGrid" class="menu-grid"></div>
  <div id="reviewModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <button id="closeModalBtn" class="btn-ghost btn-small" style="float:right;">Close</button>
    <h3 id="modalItemName"></h3>
    <div id="ratingSummary" style="color: var(--gold-soft); font-weight:700; margin-bottom: 1rem;"></div>

    <form id="reviewForm">
      <label for="reviewerName">Your Name</label>
      <input type="text" id="reviewerName" required />

      <label for="reviewRating">Rating</label>
      <select id="reviewRating" required>
        <option value="5">5 - Excellent</option>
        <option value="4">4 - Good</option>
        <option value="3">3 - Okay</option>
        <option value="2">2 - Poor</option>
        <option value="1">1 - Terrible</option>
      </select>

      <label for="reviewComment">Comment (optional)</label>
      <textarea id="reviewComment" rows="2"></textarea>

      <button type="submit">Submit Review</button>
    </form>

    <div id="reviewsList" style="margin-top:1.5rem;"></div>
  </div>
</div>
</main>

<footer>&copy; <span id="year"></span> Taste Haven. Made with care.</footer>

<script src="js/config.js"></script>
<script src="js/cart.js"></script>
<script>
document.getElementById('year').textContent = new Date().getFullYear();

let allItems = [];
let activeCategory = "All";
let searchTerm = "";
async function loadMenu() {
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = spinnerHTML("Loading menu...");
  try {
    const res = await fetch(`${API_URL}/menu`);
    const menu = await res.json();

    if (!res.ok || !Array.isArray(menu)) {
      const errMsg = (menu && (menu.details || menu.error)) || 'Unknown server error';
      throw new Error(errMsg);
    }

    allItems = menu;

    if (menu.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
        <div class="eyebrow">Nothing here yet</div>
        <p>The menu is empty. Add dishes from the <a href="admin.html">Admin</a> page.</p>
      </div>`;
      return;
    }

    renderCategoryPills();
    renderMenu();
  } catch (err) {
    console.error('Error loading menu:', err);
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
      <div class="eyebrow">Couldn't load the menu</div>
      <p>${err.message.includes('fetch') ? 'The server isn\'t reachable. Make sure the backend is running.' : err.message}</p>
    </div>`;
  }
}

function renderCategoryPills() {
  const categories = ["All", ...new Set(allItems.map(i => i.category).filter(Boolean))];
  const row = document.getElementById('categoryPills');
  row.innerHTML = categories.map(cat =>
    `<button class="pill ${cat === activeCategory ? 'active' : ''}" data-cat="${cat}">${cat}</button>`
  ).join('');

  row.querySelectorAll('.pill').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat;
      renderCategoryPills();
      renderMenu();
    });
  });
}

function renderMenu() {
  const grid = document.getElementById('menuGrid');
  let items = activeCategory === "All" ? allItems : allItems.filter(i => i.category === activeCategory);

  if (searchTerm.trim() !== "") {
    items = items.filter(i => i.name.toLowerCase().includes(searchTerm.toLowerCase()));
  
  }

  grid.innerHTML = items.map(item => `
    <div class="menu-card ${item.available === false ? 'unavailable' : ''}" data-id="${item._id}">
      <img class="menu-img" src="${item.image || 'images/logo.png'}" alt="${item.name}" onerror="this.src='images/logo.png'" />
      <h3>${item.name}</h3>
      <p class="desc">${item.description || ''}</p>
      <div class="row">
        <span class="price">₹${item.price}</span>
        <span class="add-hint">${item.available === false ? 'Unavailable' : 'Tap to add +'}</span>
      </div>
      <button class="btn-ghost btn-small reviews-btn" data-id="${item._id}" data-name="${item.name}" style="margin-top:8px; width:100%;">⭐ Reviews</button>
    </div>
  `).join('');

  grid.querySelectorAll('.menu-card').forEach(card => {
    card.addEventListener('click', () => {
      if (card.classList.contains('unavailable')) return;
      const item = allItems.find(i => i._id === card.dataset.id);
      if (item) addToCart(item);
    });
  });

  grid.querySelectorAll('.reviews-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation(); // prevents the card's own click (add to cart) from also firing
      openReviewModal(btn.dataset.id, btn.dataset.name);
    });
  });
}
document.getElementById('searchInput').addEventListener('input', (e) => {
    searchTerm = e.target.value;
    renderMenu();
});

let currentReviewItemId = null;

async function openReviewModal(itemId, itemName) {
  currentReviewItemId = itemId;
  document.getElementById('modalItemName').textContent = itemName;
  document.getElementById('reviewModal').style.display = 'flex';
  document.getElementById('reviewForm').reset();
  await loadReviews(itemId);
}

async function loadReviews(itemId) {
  const listEl = document.getElementById('reviewsList');
  const summaryEl = document.getElementById('ratingSummary');
  listEl.innerHTML = spinnerHTML('Loading reviews...');

  try {
    const res = await fetch(`${API_URL}/menu/${itemId}/reviews`);
    const reviews = await res.json();
    if (!res.ok || !Array.isArray(reviews)) throw new Error('Could not load reviews');

    if (reviews.length === 0) {
      summaryEl.textContent = 'No reviews yet — be the first!';
      listEl.innerHTML = '';
      return;
    }

    const avg = (reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length).toFixed(1);
    summaryEl.textContent = `★ ${avg} (${reviews.length} review${reviews.length > 1 ? 's' : ''})`;

    listEl.innerHTML = reviews.map(r => `
      <div class="review-item">
        <div class="review-head">
          <span>${r.customerName}</span>
          <span class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</span>
        </div>
        ${r.comment ? `<div class="comment">${r.comment}</div>` : ''}
      </div>
    `).join('');
  } catch (err) {
    console.error('Error loading reviews:', err);
    listEl.innerHTML = `<p style="color:var(--spice-soft);">Couldn't load reviews.</p>`;
  }
}

document.getElementById('closeModalBtn').addEventListener('click', () => {
  document.getElementById('reviewModal').style.display = 'none';
});

document.getElementById('reviewForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const customerName = document.getElementById('reviewerName').value.trim();
  const rating = Number(document.getElementById('reviewRating').value);
  const comment = document.getElementById('reviewComment').value.trim();

  try {
    const res = await fetch(`${API_URL}/menu/${currentReviewItemId}/reviews`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ customerName, rating, comment })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Could not submit review');

    document.getElementById('reviewForm').reset();
    await loadReviews(currentReviewItemId);
  } catch (err) {
    alert('Error submitting review: ' + err.message);
  }
});

loadMenu();
</script>
</body>
</html>
